# ============================================
# 投研协作平台 - Docker Compose 一键部署
# ============================================

version: "3.9"

services:
  # ---------- PostgreSQL + pgvector ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-postgres
    environment:
      POSTGRES_DB: research_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: research-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- MinIO (S3) ----------
  minio:
    image: minio/minio:latest
    container_name: research-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ---------- Backend (FastAPI) ----------
  backend:
    build: ./backend
    container_name: research-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/research_platform
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/research_platform
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- Celery Worker ----------
  celery-worker:
    build: ./backend
    container_name: research-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/research_platform
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/research_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker --loglevel=info --concurrency=4

  # ---------- Celery Beat (定时任务) ----------
  celery-beat:
    build: ./backend
    container_name: research-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/research_platform
      DATABASE_SYNC_URL: postgresql://postgres:postgres@postgres:5432/research_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/3
      CELERY_RESULT_BACKEND: redis://redis:6379/4
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info

  # ---------- Frontend (Next.js) ----------
  frontend:
    build: ./frontend
    container_name: research-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:
